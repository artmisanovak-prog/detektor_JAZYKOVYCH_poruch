<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porovnávač výpovědí – forenzní profily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #fefaf5;
            color: #1a1a1a;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: normal;
            border-left: 4px solid #a55;
            padding-left: 1rem;
            margin-bottom: 0.5rem;
        }
        .sub {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        .statements-area {
            margin: 1rem 0;
        }
        .stmt-card {
            border: 1px solid #e0d6cc;
            background: #fff;
            margin-bottom: 1rem;
            border-radius: 6px;
            overflow: hidden;
        }
        .stmt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f5efe8;
            padding: 0.6rem 1rem;
            cursor: pointer;
        }
        .stmt-title {
            font-weight: bold;
        }
        .stmt-body {
            padding: 1rem;
            display: none;
            border-top: 1px solid #e0d6cc;
        }
        .stmt-body input, .stmt-body textarea {
            width: 100%;
            margin: 0.3rem 0 0.8rem;
            padding: 0.5rem;
            border: 1px solid #ccc;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .stmt-body textarea {
            min-height: 120px;
            resize: vertical;
        }
        button {
            background: #2c3e2f;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        button.secondary {
            background: #7a6a5a;
        }
        button.danger {
            background: #a55;
            margin-left: 0.5rem;
        }
        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }
        .results {
            margin-top: 2rem;
            border-top: 2px solid #e0d6cc;
            padding-top: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            margin: 1rem 0;
        }
        th, td {
            border: 1px solid #e0d6cc;
            padding: 0.5rem;
            text-align: left;
            vertical-align: top;
        }
        th {
            background: #f5efe8;
        }
        .warning {
            background: #fff0e0;
            border-left: 4px solid #c77;
            padding: 0.8rem;
            margin: 1rem 0;
        }
        .profile-active {
            background: #e0f0e0;
            font-weight: bold;
        }
        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔍 Porovnávač výpovědí – detektor forenzních profilů</h1>
    <div class="sub">Porovnání strukturních profilů mezi výpověďmi. Varování při podezřelých shodách (koordinace).</div>

    <div class="btn-group">
        <button id="addStmtBtn">➕ Přidat výpověď</button>
        <button id="compareBtn">🧠 Porovnat profily</button>
        <button id="clearBtn" class="secondary">✕ Smazat vše</button>
    </div>

    <div id="statementsArea" class="statements-area"></div>
    <div id="resultsPanel" style="display: none;" class="results"></div>
    <footer>Offline nástroj – profily jsou definovány jako kombinace figur s pevnými prahy. Varování je pouze podnětem, ne důkazem.</footer>
</div>

<script>
    // ============================================================
    // 1. KNIHOVNA FIGUR (detekce na textu)
    // ============================================================
    function splitSentences(text) {
        return text.split(/(?<=[.!?…])\s+|(?<=…)\s*|\n(?=\S)/).map(s=>s.trim()).filter(s=>s.length>1);
    }

    function detectFigures(text) {
        const sentences = splitSentences(text);
        const wordCount = text.split(/\s+/).filter(w=>w.length>0).length;
        const result = {};

        // pomocné funkce
        const countMicro = (predicate) => sentences.filter(predicate).length;
        const hasMacro = (predicate) => predicate(text, sentences) ? 1 : 0;

        // Anafora
        result.anafora = countMicro((s, idx) => idx>0 && sentences[idx-1].trim().split(/\s+/)[0]?.toLowerCase() === s.trim().split(/\s+/)[0]?.toLowerCase());

        // Polysyndeton
        result.polysyndeton = countMicro(s => (s.match(/\b(a|i|nebo|ale|však|ani|či)\b/gi)||[]).length / Math.max(s.split(/\s+/).length,1) > 0.15);

        // Hypotaxe
        result.hypotaxe = countMicro(s => (s.match(/\b(který|že|aby|protože|když|jestliže|ačkoli|jakmile|dokud|pokud)\b/gi)||[]).length >= 2);

        // Parataxe
        result.parataxe = countMicro(s => s.split(/\s+/).length <= 6);

        // Změna času
        result.tempus_shift = hasMacro((t) => /\b(byl|byla|bylo|byli|šel|šla|řekl|řekla)\b/i.test(t) && /\b(je|jsou|má|mám|jde|říká|vidí)\b/i.test(t));

        // Změna role
        result.role_shift = hasMacro((t) => /\b(já|jsem|mě|mi|můj|moje|my|nás)\b/i.test(t) && /\b(on|ona|ono|oni|jej|jeho|její)\b/i.test(t));

        // Negace
        result.negace = countMicro(s => (s.match(/\b(ne|není|nejsem|nemá|nemám|nikdo|nic|nikdy|nikde|nijak)\b/gi)||[]).length >= 2);

        // Elipsa (chybí "já" u slovesa)
        result.elipsa = countMicro(s => /\b(šel|šla|řekl|řekla|viděl|viděla|udělal|udělala|byl|byla|měl|měla)\b/i.test(s) && !/\b(já|jsem)\b/i.test(s));

        // Parenteze
        result.parenteze = countMicro(s => /[–—]|\(|\)|„[^"]*“/.test(s));

        // Fixace (opakování slova 3x)
        result.fixace = (() => {
            const words = text.toLowerCase().split(/\s+/).map(w=>w.replace(/[.,!?;:]/g,''));
            const freq = {};
            words.forEach(w=>{if(w.length>3) freq[w]=(freq[w]||0)+1;});
            return Object.values(freq).some(c=>c>=3) ? 1 : 0;
        })();

        // Hyperbola
        result.hyperbola = countMicro(s => /\b(nej|absolutně|naprosto|totálně|vůbec|vždy|nikdy|tisíckrát|milokrát)\b/i.test(s));

        // Gradace (délky vět)
        result.gradace = (() => {
            const lens = sentences.map(s=>s.split(/\s+/).length);
            let inc=0, dec=0;
            for(let i=2;i<lens.length;i++) {
                if(lens[i]>lens[i-1] && lens[i-1]>lens[i-2]) inc++;
                if(lens[i]<lens[i-1] && lens[i-1]<lens[i-2]) dec++;
            }
            return (inc>=2 || dec>=2) ? 1 : 0;
        })();

        // Kontrast
        result.kontrast = countMicro(s => /\b(ale|avšak|naopak|přesto|i\s+tak)\b/i.test(s));

        // Ironie
        result.ironie = countMicro(s => /\b(byl|byla|bylo|je|jsou|jsem|jsi)\b/i.test(s) && /\b(ne|není|nejsem)\b/i.test(s) && /\b(ale|však|přesto)\b/i.test(s));

        // Deklarace
        result.deklarace = countMicro(s => /\b(prohlašuji|slibuji|potvrzuji|konstatuji|tvrdím|říkám\s+že)\b/i.test(s));

        // Metafora (X je Y bez zájmena)
        result.metafora = countMicro(s => {
            const m = s.match(/\b\w{3,}\s+(je|jsou|byl|byla)\s+\w{3,}\b/i);
            if(!m) return false;
            const before = s.substring(0, m.index).toLowerCase();
            return !/\b(já|ty|on|ona|ono|my|vy|oni)\b/.test(before);
        });

        // Přirovnání
        result.prirovnani = countMicro(s => /\b(jako|podobně\s+jako|jako\s+by)\b/i.test(s));

        // Personifikace
        result.personifikace = countMicro(s => /\b(ticho|čas|světlo|tma|věc|slovo|myšlenka|vítr|voda|zbraň|nůž|dům|auto)\b/i.test(s) && /\b(řekl|říká|myslí|cítí|ví|chce|rozhodl|smál|plakal|volal|slyší)\b/i.test(s));

        // Synestezie
        result.synestezie = countMicro(s => {
            const sense = [
                /\b(barva|červen|modr|zelen|žlut|bíl|čern|tmav|světl|vidět|pohled)\b/i,
                /\b(zvuk|tón|hluk|šum|tich|hlas|slyšet|hučet|hřmět)\b/i,
                /\b(chuť|sladk|kysel|hořk|slan|ochutnat|chutnat)\b/i,
                /\b(dotek|hladk|hrub|tepl|studen|cítit|dotýkat)\b/i,
                /\b(vůně|zápach|vonět|páchnout|aroma)\b/i
            ];
            let cnt = 0;
            sense.forEach(r => { if(r.test(s)) cnt++; });
            return cnt >= 2;
        });

        // Onomatopoeia
        result.onomatopoeia = countMicro(s => /\b(bum|prásk|žbluňk|šum|huk|šust|bzzz|mňau|haf|čvacht|klap|cink|břink)\b/i.test(s));

        // přepočet na 100 slov
        const per100 = {};
        for (let key in result) {
            per100[key] = (result[key] / Math.max(wordCount,1)) * 100;
        }
        return { raw: result, per100, wordCount };
    }

    // ============================================================
    // 2. DEFINICE PROFILŮ (12 forenzních vzorců)
    // ============================================================
    const PROFILES = [
        { name: "Rétorická příprava", check: (f) => f.anafora > 2 && f.polysyndeton > 2 && f.hypotaxe > 1.5 && f.parenteze < 1 },
        { name: "Spontánní nejistota", check: (f) => f.parataxe > 20 && f.parenteze > 1.5 && f.elipsa > 1.5 && f.anafora < 1 },
        { name: "Obranné vyhýbání", check: (f) => f.negace > 3 && f.elipsa > 2 && f.fixace > 1.5 },
        { name: "Emoční přetok", check: (f) => (f.polysyndeton > 1.5 || f.hyperbola > 1) && (f.gradace > 0 || f.tempus_shift > 0) },
        { name: "Narativní nestabilita", check: (f) => f.role_shift > 0 && f.tempus_shift > 0 },
        { name: "Nerealistická plynulost", check: (f) => f.parenteze < 0.8 && f.elipsa < 0.8 && f.hypotaxe > 2 && f.parataxe < 12 },
        { name: "Fixace / zaseknutí", check: (f) => f.fixace > 2.5 },
        { name: "Přehnaná konkrétnost", check: (f, text) => {
            const numbers = (text.match(/\b\d+\b/g)||[]).length;
            const proper = (text.match(/\b[A-ZÁČĎÉĚÍŇÓŘŠŤŮÚÝŽ][a-záčďéěíňóřšťůúýž]+\b/g)||[]).length;
            const words = text.split(/\s+/).length;
            return ((numbers+proper)/Math.max(words,1))*100 > 8;
        }},
        { name: "Sugestibilita", notApplicable: true },
        { name: "Koordinace výpovědí", notApplicable: true },
        { name: "Zlom v profilu", check: (f, text, sentences) => {
            if (sentences.length < 8) return false;
            const half = Math.floor(sentences.length/2);
            const first = detectFigures(sentences.slice(0,half).join(' ')).per100;
            const second = detectFigures(sentences.slice(half).join(' ')).per100;
            return (Math.abs(first.anafora - second.anafora) > 2 ||
                    Math.abs(first.parenteze - second.parenteze) > 2 ||
                    Math.abs(first.parataxe - second.parataxe) > 15);
        }},
        { name: "Neutrální baseline", check: (f, text, sentences, activeOthers) => activeOthers.length === 0 }
    ];

    function evaluateProfiles(text) {
        const { per100, raw, wordCount } = detectFigures(text);
        const sentences = splitSentences(text);
        const active = [];
        PROFILES.forEach(prof => {
            if (prof.notApplicable) return;
            let activeFlag = false;
            if (prof.name === "Přehnaná konkrétnost") activeFlag = prof.check(per100, text);
            else if (prof.name === "Zlom v profilu") activeFlag = prof.check(per100, text, sentences);
            else if (prof.name === "Neutrální baseline") activeFlag = false; // bude dopočteno později
            else activeFlag = prof.check(per100);
            if (activeFlag) active.push(prof.name);
        });
        // Neutrální baseline
        if (active.length === 0) active.push("Neutrální baseline");
        return active;
    }

    // ============================================================
    // 3. SPRÁVA VÝPOVĚDÍ (KARTY)
    // ============================================================
    let statements = [];
    let nextId = 1;

    function renderStatements() {
        const container = document.getElementById('statementsArea');
        if (statements.length === 0) {
            container.innerHTML = '<p style="color:#888;">Zatím žádné výpovědi. Klikněte na "Přidat výpověď".</p>';
            return;
        }
        container.innerHTML = statements.map(st => `
            <div class="stmt-card" data-id="${st.id}">
                <div class="stmt-header" onclick="toggleBody(${st.id})">
                    <span class="stmt-title">${escapeHtml(st.name) || 'Výpověď'}</span>
                    <button class="danger" onclick="event.stopPropagation(); deleteStatement(${st.id})">✕</button>
                </div>
                <div class="stmt-body" id="body-${st.id}">
                    <label>Jméno / role:</label>
                    <input type="text" id="name-${st.id}" value="${escapeHtml(st.name)}" onchange="updateName(${st.id}, this.value)">
                    <label>Text výpovědi:</label>
                    <textarea id="text-${st.id}" onchange="updateText(${st.id}, this.value)">${escapeHtml(st.text)}</textarea>
                </div>
            </div>
        `).join('');
    }

    function addStatement() {
        statements.push({ id: nextId++, name: '', text: '' });
        renderStatements();
    }

    function deleteStatement(id) {
        statements = statements.filter(s => s.id !== id);
        renderStatements();
        document.getElementById('resultsPanel').style.display = 'none';
    }

    function updateName(id, val) {
        const st = statements.find(s => s.id === id);
        if (st) st.name = val;
    }
    function updateText(id, val) {
        const st = statements.find(s => s.id === id);
        if (st) st.text = val;
    }
    function toggleBody(id) {
        const el = document.getElementById(`body-${id}`);
        if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
    }
    function escapeHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ============================================================
    // 4. POROVNÁNÍ PROFILŮ
    // ============================================================
    function compareProfiles() {
        const valid = statements.filter(s => s.text.trim().length > 0);
        if (valid.length < 2) {
            alert('Pro porovnání potřebujete alespoň dvě výpovědi s textem.');
            return;
        }

        const profiles = {};
        valid.forEach(s => {
            profiles[s.id] = evaluateProfiles(s.text);
        });

        // Vytvoření tabulky
        let tableRows = '<thead><tr><th>Výpověď</th><th>Profily (aktivní)</th></tr></thead><tbody>';
        for (let s of valid) {
            const profList = profiles[s.id].join(', ');
            tableRows += `<tr><td>${escapeHtml(s.name) || s.id}</td><td>${profList || '—'}</td></tr>`;
        }
        tableRows += '</tbody>';

        // Hledání shodných profilů napříč výpověďmi
        const allProfileNames = [...new Set(valid.flatMap(s => profiles[s.id]))];
        const suspicious = [];
        for (let prof of allProfileNames) {
            if (prof === 'Neutrální baseline') continue;
            const count = valid.filter(s => profiles[s.id].includes(prof)).length;
            if (count >= 2) {
                const who = valid.filter(s => profiles[s.id].includes(prof)).map(s => s.name || s.id).join(', ');
                suspicious.push(`Profil <strong>${prof}</strong> se vyskytuje u ${count} výpovědí: ${who}`);
            }
        }

        let warningHtml = '';
        if (suspicious.length > 0) {
            warningHtml = `<div class="warning">⚠️ <strong>Podezření na koordinaci / strukturální podobnost</strong><br>${suspicious.join('<br>')}</div>`;
        }

        const resultsDiv = document.getElementById('resultsPanel');
        resultsDiv.innerHTML = `
            <h2>📊 Srovnání profilů</h2>
            <table>${tableRows}</table>
            ${warningHtml}
            <p style="font-size:0.75rem; color:#888; margin-top:1rem;">Profily jsou definovány jako kombinace figur (anafora, polysyndeton, atd.). Shodný profil u více výpovědí může být náhodný, ale stojí za prozkoumání.</p>
        `;
        resultsDiv.style.display = 'block';
    }

    // UI handlers
    document.getElementById('addStmtBtn').addEventListener('click', addStatement);
    document.getElementById('compareBtn').addEventListener('click', compareProfiles);
    document.getElementById('clearBtn').addEventListener('click', () => {
        statements = [];
        renderStatements();
        document.getElementById('resultsPanel').style.display = 'none';
    });

    window.toggleBody = toggleBody;
    window.deleteStatement = deleteStatement;
    window.updateName = updateName;
    window.updateText = updateText;

    renderStatements();
</script>
</body>
</html>
