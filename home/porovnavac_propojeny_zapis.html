<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chceš myš? – Porovnávač výpovědí (propojený)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #fefaf5;
            color: #1a1a1a;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; border-bottom: 2px solid #e0d6cc; padding-bottom: 0.8rem; }
        .logo { width: 48px; height: 48px; object-fit: contain; }
        .logo-placeholder { width: 48px; height: 48px; background: #e0d6cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        .system-title { font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; color: #a55; }
        h1 { font-size: 1.8rem; font-weight: normal; margin: 0.5rem 0 0.2rem; }
        .sub { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
        button { background: #2c3e2f; color: white; border: none; padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 4px; cursor: pointer; font-family: inherit; }
        button.secondary { background: #7a6a5a; }
        .statements-area { display: flex; flex-direction: column; gap: 1rem; margin: 1rem 0; }
        .stmt-card { border: 1px solid #e0d6cc; background: #fff; border-radius: 8px; overflow: hidden; }
        .stmt-header { display: flex; justify-content: space-between; align-items: center; background: #f5efe8; padding: 0.6rem 1rem; cursor: pointer; }
        .stmt-title { font-weight: bold; }
        .stmt-body { padding: 1rem; display: none; border-top: 1px solid #e0d6cc; }
        .stmt-body input, .stmt-body textarea { width: 100%; margin: 0.3rem 0 0.8rem; padding: 0.5rem; border: 1px solid #ccc; font-family: inherit; font-size: 0.85rem; border-radius: 4px; }
        .stmt-body textarea { min-height: 150px; resize: vertical; }
        .results { margin-top: 2rem; border-top: 2px solid #e0d6cc; padding-top: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin: 1rem 0; }
        th, td { border: 1px solid #e0d6cc; padding: 0.6rem; text-align: left; vertical-align: top; }
        th { background: #f5efe8; }
        .warning { background: #fff0e0; border-left: 4px solid #c77; padding: 0.8rem; margin: 1rem 0; }
        .profile-row { cursor: pointer; background: #fff; transition: background 0.1s; }
        .profile-row:hover { background: #faf0e8; }
        .profile-detail { display: none; background: #f5efe8; padding: 0.8rem; font-size: 0.8rem; border-top: 1px solid #e0d6cc; }
        footer { margin-top: 2rem; font-size: 0.7rem; color: #888; text-align: center; border-top: 1px solid #e0d6cc; padding-top: 1rem; }
        @media (max-width: 800px) { table, thead, tbody, th, td, tr { display: block; } th, td { border: none; } tr { border-bottom: 1px solid #e0d6cc; margin-bottom: 0.5rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <img id="logoImg" class="logo" src="doma/ikona_mys.png" alt="myš" onerror="this.style.display='none'; document.getElementById('logoPlaceholder').style.display='flex';">
        <div id="logoPlaceholder" class="logo-placeholder" style="display:none;">🐁</div>
        <div>
            <div class="system-title">Chceš myš? – Slovník mezer</div>
            <h1>🔍 Porovnávač výpovědí</h1>
        </div>
    </div>
    <div class="sub">Načítá výpovědi z Kognitivní mapy (klíč lexis_v5). Porovná profily napříč výpověďmi. Výsledky ukládá zpět do mapy a do Zápisníku mezer.</div>

    <div class="btn-group">
        <button id="addStmtBtn">➕ Přidat výpověď</button>
        <button id="compareBtn">🧠 Porovnat profily</button>
        <button id="saveToJournalBtn" class="secondary">📓 Uložit analýzu do zápisníku</button>
        <button id="clearAllBtn" class="secondary">✕ Smazat vše</button>
    </div>

    <div id="statementsArea" class="statements-area"></div>
    <div id="resultsPanel" style="display: none;" class="results"></div>
    <footer>Kliknutím na řádek profilu rozbalíte detail. Shodné profily napříč výpověďmi mohou značit koordinaci.</footer>
</div>

<script>
    // ============================================================
    // 1. DETEKCE FIGUR (stejný engine)
    // ============================================================
    function splitSentences(text) {
        return text.split(/(?<=[.!?…])\s+|(?<=…)\s*|\n(?=\S)/).map(s=>s.trim()).filter(s=>s.length>1);
    }

    function detectFigures(text) {
        const sentences = splitSentences(text);
        const wordCount = text.split(/\s+/).filter(w=>w.length>0).length;
        const raw = {};

        const countMicro = (predicate) => sentences.filter(predicate).length;
        const hasMacro = (predicate) => predicate(text, sentences) ? 1 : 0;

        raw.anafora = countMicro((s, idx) => idx>0 && sentences[idx-1].trim().split(/\s+/)[0]?.toLowerCase() === s.trim().split(/\s+/)[0]?.toLowerCase());
        raw.polysyndeton = countMicro(s => (s.match(/\b(a|i|nebo|ale|však|ani|či)\b/gi)||[]).length / Math.max(s.split(/\s+/).length,1) > 0.15);
        raw.hypotaxe = countMicro(s => (s.match(/\b(který|že|aby|protože|když|jestliže|ačkoli|jakmile|dokud|pokud)\b/gi)||[]).length >= 2);
        raw.parataxe = countMicro(s => s.split(/\s+/).length <= 6);
        raw.tempus_shift = hasMacro((t) => /\b(byl|byla|bylo|byli|šel|šla|řekl|řekla)\b/i.test(t) && /\b(je|jsou|má|mám|jde|říká|vidí)\b/i.test(t));
        raw.role_shift = hasMacro((t) => /\b(já|jsem|mě|mi|můj|moje|my|nás)\b/i.test(t) && /\b(on|ona|ono|oni|jej|jeho|její)\b/i.test(t));
        raw.negace = countMicro(s => (s.match(/\b(ne|není|nejsem|nemá|nemám|nikdo|nic|nikdy|nikde|nijak)\b/gi)||[]).length >= 2);
        raw.elipsa = countMicro(s => /\b(šel|šla|řekl|řekla|viděl|viděla|udělal|udělala|byl|byla|měl|měla)\b/i.test(s) && !/\b(já|jsem)\b/i.test(s));
        raw.parenteze = countMicro(s => /[–—]|\(|\)|„[^"]*“/.test(s));
        raw.fixace = (() => {
            const words = text.toLowerCase().split(/\s+/).map(w=>w.replace(/[.,!?;:]/g,''));
            const freq = {};
            words.forEach(w=>{if(w.length>3) freq[w]=(freq[w]||0)+1;});
            return Object.values(freq).some(c=>c>=3) ? 1 : 0;
        })();
        raw.hyperbola = countMicro(s => /\b(nej|absolutně|naprosto|totálně|vůbec|vždy|nikdy|tisíckrát|milokrát)\b/i.test(s));
        raw.gradace = (() => {
            const lens = sentences.map(s=>s.split(/\s+/).length);
            let inc=0, dec=0;
            for(let i=2;i<lens.length;i++) {
                if(lens[i]>lens[i-1] && lens[i-1]>lens[i-2]) inc++;
                if(lens[i]<lens[i-1] && lens[i-1]<lens[i-2]) dec++;
            }
            return (inc>=2 || dec>=2) ? 1 : 0;
        })();
        raw.kontrast = countMicro(s => /\b(ale|avšak|naopak|přesto|i\s+tak)\b/i.test(s));
        raw.ironie = countMicro(s => /\b(byl|byla|bylo|je|jsou|jsem|jsi)\b/i.test(s) && /\b(ne|není|nejsem)\b/i.test(s) && /\b(ale|však|přesto)\b/i.test(s));
        raw.deklarace = countMicro(s => /\b(prohlašuji|slibuji|potvrzuji|konstatuji|tvrdím|říkám\s+že)\b/i.test(s));
        raw.metafora = countMicro(s => {
            const m = s.match(/\b\w{3,}\s+(je|jsou|byl|byla)\s+\w{3,}\b/i);
            if(!m) return false;
            const before = s.substring(0, m.index).toLowerCase();
            return !/\b(já|ty|on|ona|ono|my|vy|oni)\b/.test(before);
        });
        raw.prirovnani = countMicro(s => /\b(jako|podobně\s+jako|jako\s+by)\b/i.test(s));
        raw.personifikace = countMicro(s => /\b(ticho|čas|světlo|tma|věc|slovo|myšlenka|vítr|voda|zbraň|nůž|dům|auto)\b/i.test(s) && /\b(řekl|říká|myslí|cítí|ví|chce|rozhodl|smál|plakal|volal|slyší)\b/i.test(s));
        raw.synestezie = countMicro(s => {
            const sense = [
                /\b(barva|červen|modr|zelen|žlut|bíl|čern|tmav|světl|vidět|pohled)\b/i,
                /\b(zvuk|tón|hluk|šum|tich|hlas|slyšet|hučet|hřmět)\b/i,
                /\b(chuť|sladk|kysel|hořk|slan|ochutnat|chutnat)\b/i,
                /\b(dotek|hladk|hrub|tepl|studen|cítit|dotýkat)\b/i,
                /\b(vůně|zápach|vonět|páchnout|aroma)\b/i
            ];
            let cnt = 0;
            sense.forEach(r => { if(r.test(s)) cnt++; });
            return cnt >= 2;
        });
        raw.onomatopoeia = countMicro(s => /\b(bum|prásk|žbluňk|šum|huk|šust|bzzz|mňau|haf|čvacht|klap|cink|břink)\b/i.test(s));

        const per100 = {};
        for (let key in raw) {
            per100[key] = (raw[key] / Math.max(wordCount,1)) * 100;
        }
        return { per100, wordCount, sentences };
    }

    // ============================================================
    // 2. PROFILY (12, binární)
    // ============================================================
    const PROFILES = [
        { name: "Rétorická příprava", 
          desc: "Text působí stylisticky vyhlazeně, často s opakováním a složitými souvětími.",
          forensic: "Výpověď pravděpodobně předem připravená. V mluveném projevu podezřelé.",
          rule: "anafora > 2, polysyndeton > 2, hypotaxe > 1.5, parenteze < 1",
          check: (f) => f.anafora > 2 && f.polysyndeton > 2 && f.hypotaxe > 1.5 && f.parenteze < 1 },
        { name: "Spontánní nejistota",
          desc: "Přirozený mluvený projev s krátkými větami, váháním a opravami.",
          forensic: "Autentický projev, může být stresovaný, ale nepřipravený.",
          rule: "parataxe > 20, parenteze > 1.5, elipsa > 1.5, anafora < 1",
          check: (f) => f.parataxe > 20 && f.parenteze > 1.5 && f.elipsa > 1.5 && f.anafora < 1 },
        { name: "Obranné vyhýbání",
          desc: "Popírání, vynechávání podmětu, opakování – snaha vyhnout se odpovědnosti.",
          forensic: "Možné klamání nebo snaha se distancovat.",
          rule: "negace > 3, elipsa > 2, fixace > 1.5",
          check: (f) => f.negace > 3 && f.elipsa > 2 && f.fixace > 1.5 },
        { name: "Emoční přetok",
          desc: "Emocionálně nabitá výpověď s nadsázkou, gradací a přeskoky časů.",
          forensic: "Může být autentické trauma, ale i stylizace.",
          rule: "(polysyndeton > 1.5 nebo hyperbola > 1) a (gradace > 0 nebo tempus_shift > 0)",
          check: (f) => (f.polysyndeton > 1.5 || f.hyperbola > 1) && (f.gradace > 0 || f.tempus_shift > 0) },
        { name: "Narativní nestabilita",
          desc: "Nestálá perspektiva – svědek přepíná mezi vlastní zkušeností a doslechem.",
          forensic: "Svědek nestabilně přepíná perspektivu – možná popisuje cizí zážitek.",
          rule: "role_shift > 0 a tempus_shift > 0",
          check: (f) => f.role_shift > 0 && f.tempus_shift > 0 },
        { name: "Nerealistická plynulost",
          desc: "Text je příliš hladký, bez přirozených oprav a krátkých vět.",
          forensic: "Téměř jistě předem napsaný text, odříkávaný.",
          rule: "parenteze < 0.8, elipsa < 0.8, hypotaxe > 2, parataxe < 12",
          check: (f) => f.parenteze < 0.8 && f.elipsa < 0.8 && f.hypotaxe > 2 && f.parataxe < 12 },
        { name: "Fixace / zaseknutí",
          desc: "Opakování stejných slov, neschopnost posunout se dále.",
          forensic: "Stres, zahlcování, nebo úmyslné zdůraznění.",
          rule: "fixace > 2.5",
          check: (f) => f.fixace > 2.5 },
        { name: "Přehnaná konkrétnost",
          desc: "Nepřirozeně mnoho detailů (čísla, vlastní jména).",
          forensic: "Často známka naučené výpovědi.",
          rule: "detaily na 100 slov > 8",
          check: (f, text) => {
              const numbers = (text.match(/\b\d+\b/g)||[]).length;
              const proper = (text.match(/\b[A-ZÁČĎÉĚÍŇÓŘŠŤŮÚÝŽ][a-záčďéěíňóřšťůúýž]+\b/g)||[]).length;
              const words = text.split(/\s+/).length;
              return ((numbers+proper)/Math.max(words,1))*100 > 8;
          }},
        { name: "Zlom v profilu",
          desc: "Náhlá změna struktury – podezření na vloženou pasáž.",
          forensic: "Text byl pravděpodobně složen z více částí.",
          rule: "rozdíl v anafoře, parentezi nebo parataxi mezi polovinami > práh",
          check: (f, text, sentences) => {
              if (sentences.length < 8) return false;
              const half = Math.floor(sentences.length/2);
              const first = detectFigures(sentences.slice(0,half).join(' ')).per100;
              const second = detectFigures(sentences.slice(half).join(' ')).per100;
              return (Math.abs(first.anafora - second.anafora) > 2 ||
                      Math.abs(first.parenteze - second.parenteze) > 2 ||
                      Math.abs(first.parataxe - second.parataxe) > 15);
          }},
        { name: "Neutrální baseline", desc: "Žádný z výrazných profilů se neuplatňuje.", forensic: "Text je jazykově nezatížený.", rule: "Žádný jiný profil aktivní", check: (f, text, sentences, activeOthers) => activeOthers === 0 }
    ];

    function evaluateProfiles(text) {
        const { per100, wordCount, sentences } = detectFigures(text);
        let activeNames = [];
        for (let prof of PROFILES) {
            let active = false;
            if (prof.name === "Přehnaná konkrétnost") active = prof.check(per100, text);
            else if (prof.name === "Zlom v profilu") active = prof.check(per100, text, sentences);
            else if (prof.name !== "Neutrální baseline") active = prof.check(per100);
            if (active) activeNames.push(prof.name);
        }
        if (activeNames.length === 0) activeNames.push("Neutrální baseline");
        return activeNames;
    }

    // ============================================================
    // 3. SPRÁVA VÝPOVĚDÍ – PROPOJENÍ S LOCALSTORAGE (klíč lexis_v5)
    // ============================================================
    const STORAGE_KEY = 'lexis_v5';
    let statements = [];
    let nextId = 1;

    function loadFromStorage() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            if (data.statements && Array.isArray(data.statements)) {
                statements = data.statements;
                // Zajistíme, že každá výpověď má pole profiles (pro budoucí ukládání)
                statements.forEach(s => { if (!s.profiles) s.profiles = []; });
                if (data.nextId) nextId = data.nextId;
                else nextId = Math.max(0, ...statements.map(s=>s.id), 0) + 1;
            } else {
                statements = [];
                nextId = 1;
            }
        } catch(e) { console.warn(e); statements = []; nextId = 1; }
        renderStatements();
    }

    function saveToStorage() {
        let data = { statements, nextId };
        // Zachováme ostatní vlastnosti jako baselineFields, customFields atd., pokud existují
        const existing = localStorage.getItem(STORAGE_KEY);
        if (existing) {
            try {
                const full = JSON.parse(existing);
                full.statements = statements;
                full.nextId = nextId;
                data = full;
            } catch(e) {}
        }
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function renderStatements() {
        const container = document.getElementById('statementsArea');
        if (statements.length === 0) {
            container.innerHTML = '<p style="color:#888;">Zatím žádné výpovědi. Klikněte na "Přidat výpověď".</p>';
            return;
        }
        container.innerHTML = statements.map(st => `
            <div class="stmt-card" data-id="${st.id}">
                <div class="stmt-header" onclick="toggleBody(${st.id})">
                    <span class="stmt-title">${escapeHtml(st.name) || 'Výpověď ' + st.id}</span>
                    <button class="danger" onclick="event.stopPropagation(); deleteStatement(${st.id})">✕</button>
                </div>
                <div class="stmt-body" id="body-${st.id}" style="display: none;">
                    <label>Jméno / role:</label>
                    <input type="text" id="name-${st.id}" value="${escapeHtml(st.name)}" onchange="updateName(${st.id}, this.value)">
                    <label>Text výpovědi:</label>
                    <textarea id="text-${st.id}" oninput="updateText(${st.id}, this.value)">${escapeHtml(st.text)}</textarea>
                </div>
            </div>
        `).join('');
    }

    function addStatement() {
        const id = nextId++;
        statements.push({ id: id, name: '', role: 'svedek', text: '', notes: '', disorders: [], matching: {}, profiles: [] });
        saveToStorage();
        renderStatements();
        const body = document.getElementById(`body-${id}`);
        if (body) body.style.display = 'block';
    }

    function deleteStatement(id) {
        statements = statements.filter(s => s.id !== id);
        saveToStorage();
        renderStatements();
        document.getElementById('resultsPanel').style.display = 'none';
    }

    function updateName(id, val) {
        const st = statements.find(s => s.id === id);
        if (st) st.name = val;
        saveToStorage();
    }

    function updateText(id, val) {
        const st = statements.find(s => s.id === id);
        if (st) st.text = val;
        saveToStorage();
    }

    window.toggleBody = function(id) {
        const el = document.getElementById(`body-${id}`);
        if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };
    window.deleteStatement = deleteStatement;
    window.updateName = updateName;
    window.updateText = updateText;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ============================================================
    // 4. POROVNÁNÍ PROFILŮ A UKLÁDÁNÍ VÝSLEDKŮ
    // ============================================================
    let lastResults = null;

    function compareProfiles() {
        const valid = statements.filter(s => s.text.trim().length > 0);
        if (valid.length < 2) {
            alert('Pro porovnání potřebujete alespoň dvě výpovědi s textem.');
            return;
        }

        const results = [];
        valid.forEach(s => {
            const active = evaluateProfiles(s.text);
            results.push({ name: s.name || `Výpověď ${s.id}`, profiles: active, id: s.id });
            // Uložíme profily do výpovědi
            s.profiles = active;
        });
        saveToStorage();
        lastResults = results;

        // Tabulka přehledu
        let tableHtml = '<thead><tr><th>Výpověď</th><th>Aktivní profily</th></tr></thead><tbody>';
        for (let r of results) {
            tableHtml += `<tr><td><strong>${escapeHtml(r.name)}</strong></td><td>${r.profiles.map(p => escapeHtml(p)).join(', ') || '—'}</td></tr>`;
        }
        tableHtml += '</tbody>';

        // Varování na shodné profily
        const allProfileNames = [...new Set(results.flatMap(r => r.profiles))];
        const suspicious = [];
        for (let prof of allProfileNames) {
            if (prof === 'Neutrální baseline') continue;
            const count = results.filter(r => r.profiles.includes(prof)).length;
            if (count >= 2) {
                const who = results.filter(r => r.profiles.includes(prof)).map(r => r.name).join(', ');
                suspicious.push(`Profil <strong>${escapeHtml(prof)}</strong> se vyskytuje u ${count} výpovědí: ${escapeHtml(who)}`);
            }
        }
        const warningHtml = suspicious.length ? `<div class="warning">⚠️ <strong>Podezření na koordinaci / strukturální podobnost</strong><br>${suspicious.join('<br>')}</div>` : '';

        // Detailní tabulka profilů s rozklikávacími řádky
        let detailRows = '';
        for (let prof of PROFILES) {
            detailRows += `
                <tr class="profile-row" data-profile="${prof.name.replace(/\s/g,'')}">
                    <td><strong>${prof.name}</strong><br><span style="font-size:0.7rem;">${prof.desc}</span></td>
                    ${results.map(r => `<td style="text-align:center;">${r.profiles.includes(prof.name) ? '✅' : '❌'}</td>`).join('')}
                </tr>
                <tr class="profile-detail" id="detail-${prof.name.replace(/\s/g,'')}" style="display:none;">
                    <td colspan="${results.length+1}" style="background:#f5efe8;">
                        <p><strong>Forenzní význam:</strong> ${prof.forensic}</p>
                        <p><strong>Detekční pravidlo:</strong> ${prof.rule}</p>
                        <p><strong>Popis:</strong> ${prof.desc}</p>
                    </td>
                </tr>
            `;
        }

        const resultsDiv = document.getElementById('resultsPanel');
        resultsDiv.innerHTML = `
            <h2>📊 Srovnání profilů</h2>
            <table>${tableHtml}</table>
            ${warningHtml}
            <h3>📋 Detailní přehled profilů (kliknutím na řádek rozbalíte)</h3>
            <table id="profileTable">
                <thead><tr><th>Profil</th>${results.map(r => `<th>${escapeHtml(r.name)}</th>`).join('')}</thead>
                <tbody>${detailRows}</tbody>
            </table>
        `;
        resultsDiv.style.display = 'block';

        // Event listenery pro rozklikávání
        document.querySelectorAll('.profile-row').forEach(row => {
            row.addEventListener('click', () => {
                const profileKey = row.getAttribute('data-profile');
                const detailRow = document.getElementById(`detail-${profileKey}`);
                if (detailRow) {
                    detailRow.style.display = detailRow.style.display === 'none' ? 'table-row' : 'none';
                }
            });
        });
    }

    // ============================================================
    // 5. UKLÁDÁNÍ DO ZÁPISNÍKU MEZER (klíč chcesmys_zapisnik)
    // ============================================================
    function saveToJournal() {
        if (!lastResults) {
            alert('Nejprve proveďte porovnání profilů (tlačítko "Porovnat profily").');
            return;
        }
        const ts = Date.now();
        const caseName = (() => {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) try { return JSON.parse(raw).caseName || ''; } catch(e) {}
            return '';
        })();
        const topShoda = lastResults.filter(r => r.profiles.length > 0).map(r => `${r.name}: ${r.profiles.join(', ')}`).join('; ');
        const entry = {
            id: 'cmp_'+ts,
            ts: ts,
            karta: 'Porovnávač',
            typ: 'porovnani',
            nazev: `Porovnání výpovědí – ${caseName || 'případ'} ${new Date(ts).toLocaleDateString('cs-CZ')}`,
            text: `Porovnáno ${lastResults.length} výpovědí.\nShodné profily: ${topShoda}\n\nDetail viz tabulka v nástroji.`
        };
        const journalKey = 'chcesmys_zapisnik';
        let journal = {};
        try { journal = JSON.parse(localStorage.getItem(journalKey) || '{}'); } catch(e) {}
        let mapId = 'map_default';
        if (!journal[mapId]) journal[mapId] = { name: 'Zápisník mezer', popis: '', entries: [], created: ts };
        journal[mapId].entries.unshift(entry);
        localStorage.setItem(journalKey, JSON.stringify(journal));
        alert('Analýza uložena do Zápisníku mezer.');
    }

    // ============================================================
    // 6. INICIALIZACE
    // ============================================================
    document.getElementById('addStmtBtn').addEventListener('click', addStatement);
    document.getElementById('compareBtn').addEventListener('click', compareProfiles);
    document.getElementById('saveToJournalBtn').addEventListener('click', saveToJournal);
    document.getElementById('clearAllBtn').addEventListener('click', () => {
        if (confirm('Smazat VŠECHNY výpovědi (včetně těch z Kognitivní mapy)?')) {
            statements = [];
            nextId = 1;
            saveToStorage();
            renderStatements();
            document.getElementById('resultsPanel').style.display = 'none';
        }
    });

    loadFromStorage();

    const img = document.getElementById('logoImg');
    img.onerror = () => { img.style.display = 'none'; document.getElementById('logoPlaceholder').style.display = 'flex'; };
</script>
</body>
</html>
